<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Health Seva | Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <script src="/js/tailwind-config.js"></script>
  <link rel="stylesheet" href="/css/custom.css" />
</head>
<body class="bg-background min-h-screen flex items-center justify-center p-6">
  <div class="w-full max-w-md glass-card rounded-3xl p-10">
    <a href="/" class="flex items-center gap-2 mb-8 text-primary font-headline-md font-bold">
      <span class="material-symbols-outlined">health_and_safety</span> Health Seva
    </a>
    <h1 class="font-headline-lg text-headline-lg text-on-surface mb-2">Welcome Back</h1>
    <p class="text-on-surface-variant mb-8">Login to your healthcare dashboard</p>
    <form id="loginForm" class="space-y-5">
      <div>
        <label class="font-label-md text-on-surface-variant" for="email">Email Address</label>
        <input id="email" type="email" required class="mt-2 w-full rounded-2xl bg-surface-container-low border-none p-3.5 focus:ring-2 focus:ring-primary" placeholder="you@email.com" />
      </div>
      <div>
        <label class="font-label-md text-on-surface-variant" for="password">Password</label>
        <input id="password" type="password" required class="mt-2 w-full rounded-2xl bg-surface-container-low border-none p-3.5 focus:ring-2 focus:ring-primary" placeholder="Your password" />
      </div>
      <label class="flex items-center gap-2 text-body-sm text-on-surface-variant">
        <input type="checkbox" class="rounded text-primary" /> Stay logged in
      </label>
      <button type="submit" class="w-full py-4 bg-primary text-on-primary rounded-2xl font-label-md shadow-lg hover:opacity-95 active:scale-95 transition-all">
        Login to Dashboard
      </button>
    </form>
    <div class="mt-6 grid grid-cols-2 gap-3">
      <a href="/signup-user.html" class="text-center py-3 rounded-xl border border-outline-variant hover:bg-surface-container-low font-label-md text-primary">User Signup</a>
      <a href="/signup-asha.html" class="text-center py-3 rounded-xl border border-outline-variant hover:bg-surface-container-low font-label-md text-secondary">ASHA Signup</a>
    </div>
  </div>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector("button[type=submit]");
      btn.disabled = true;
      try {
        const data = await api.login({
          email: document.getElementById("email").value,
          password: document.getElementById("password").value,
        });
        saveSession(data.access_token, data.role, data.user_id, data.name);
        redirectAfterLogin(data.role);
      } catch (err) {
        showToast(err.message, "error");
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
